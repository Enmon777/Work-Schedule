<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #eaf6ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 360px;
        height: 640px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    h1 {
        font-size: 22px;
        color: #0077cc;
        margin-bottom: 5px;
    }

    .time {
        font-size: 14px;
        color: #555;
        margin-bottom: 15px;
    }

    .card {
        background: #f0f8ff;
        border-radius: 15px;
        padding: 15px;
        margin-bottom: 15px;
    }

    .card h2 {
        font-size: 16px;
        color: #0077cc;
        margin-bottom: 10px;
    }

    .next-shift {
        font-size: 14px;
        color: #333;
    }

    .schedule {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 5px;
        text-align: center;
        margin-top: 10px;
    }

    .day {
        font-size: 12px;
        color: #0077cc;
        font-weight: bold;
    }

    .hours {
        font-size: 12px;
        color: #333;
    }

    .total {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
        color: #0077cc;
    }

    .bottom-nav {
        display: flex;
        justify-content: space-around;
        background: #d6ecff;
        border-radius: 15px;
        padding: 10px 0;
    }

    .nav-item {
        font-size: 14px;
        color: #0077cc;
        cursor: pointer;
    }

    .nav-item:hover {
        font-weight: bold;
    }
</style>

</head>
<body>

<div class="container">

    <!-- Header -->
    <div>
        <h1>Work Schedule</h1>
        <div class="time" id="datetime"></div>
    </div>

    <!-- Next Shift -->
    <div class="card">
        <h2>Next Shift</h2>
        <div class="next-shift">Monday - 9:00 AM to 5:00 PM</div>
    </div>

    <!-- Weekly Schedule -->
    <div class="card">
        <h2>Weekly Hours</h2>

        <div class="schedule">
            <div>
                <div class="day">Sun</div>
                <div class="hours" data-hours="0">0h</div>
            </div>
            <div>
                <div class="day">Mon</div>
                <div class="hours" data-hours="8">8h</div>
            </div>
            <div>
                <div class="day">Tue</div>
                <div class="hours" data-hours="6">6h</div>
            </div>
            <div>
                <div class="day">Wed</div>
                <div class="hours" data-hours="8">8h</div>
            </div>
            <div>
                <div class="day">Thu</div>
                <div class="hours" data-hours="5">5h</div>
            </div>
            <div>
                <div class="day">Fri</div>
                <div class="hours" data-hours="7">7h</div>
            </div>
            <div>
                <div class="day">Sat</div>
                <div class="hours" data-hours="4">4h</div>
            </div>
        </div>

        <div class="total" id="totalHours">Total: 0h</div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item">More</div>
        <div class="nav-item">Dashboard</div>
        <div class="nav-item">Menu</div>
    </div>

</div>

<script>
    function updateDateTime() {
        const now = new Date();
        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: 'numeric'
        };
        document.getElementById("datetime").innerText =
            now.toLocaleDateString('en-US', options);
    }

    function calculateTotalHours() {
        let total = 0;
        document.querySelectorAll('.hours').forEach(el => {
            total += parseInt(el.dataset.hours);
        });
        document.getElementById("totalHours").innerText = "Total: " + total + "h";
    }

    setInterval(updateDateTime, 1000);
    updateDateTime();
    calculateTotalHours();
</script>

</body>
</html>
