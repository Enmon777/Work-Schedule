<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neomorphism · sign up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #e0e5ec;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 460px;
            background: #e0e5ec;
            border-radius: 48px;
            box-shadow: 20px 20px 40px rgba(166, 180, 200, 0.6),
                        -12px -12px 24px rgba(255, 255, 255, 0.8);
        }

        .form-container {
            padding: 2rem 1.8rem 2.2rem;
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #2c3e4e;
            margin-bottom: 1.8rem;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.3rem;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #3a5468;
            margin-left: 0.5rem;
        }

        .input-group input {
            background: #e0e5ec;
            border: none;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border-radius: 34px;
            color: #1f2f3a;
            font-weight: 500;
            box-shadow: inset 6px 6px 12px #b8c0cc,
                        inset -4px -4px 8px #ffffffb3;
            outline: none;
            width: 100%;
        }

        .input-group input:focus {
            box-shadow: inset 5px 5px 10px #a3abb8,
                        inset -3px -3px 6px #ffffff;
        }

        .input-group input::placeholder {
            color: #8c9aaa;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .action-btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 44px;
            font-size: 1rem;
            font-weight: 700;
            color: #1e3b4a;
            background: #e0e5ec;
            box-shadow: 7px 7px 14px #b9c1ce,
                        -5px -5px 10px #ffffff;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.1s linear;
        }

        .action-btn:active {
            box-shadow: inset 4px 4px 8px #bac2cf,
                        inset -3px -3px 6px #ffffff;
            transform: scale(0.98);
        }

        .switch-section {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(100, 120, 130, 0.2);
        }

        .switch-section p {
            font-size: 0.85rem;
            color: #4c6578;
            margin-bottom: 0.6rem;
        }

        .switch-btn {
            background: transparent;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            color: #2c6280;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s;
        }

        .switch-btn:hover {
            background: rgba(44, 98, 128, 0.06);
            box-shadow: 3px 3px 6px #b9c1ce, -2px -2px 4px white;
        }
    </style>

    <script type="module" src="firebaseService.js" defer></script>
</head>
<body>
<div class="container">
    <div class="form-container">
        <h2>create account</h2>

        <form id="signupForm">
            <div class="input-group">
                <label>full name</label>
                <input type="text" placeholder="Alex Morgan" id="fullname">
            </div>

            <div class="input-group">
                <label>email</label>
                <input type="email" placeholder="hello@example.com" id="email">
            </div>

            <div class="input-group">
                <label>password</label>
                <input type="password" placeholder="••••••••" id="password">
            </div>

            <div class="input-group">
                <label>confirm password</label>
                <input type="password" placeholder="••••••••" id="confirmPassword">
            </div>

            <button type="submit" class="action-btn">sign up →</button>
        </form>

        <div class="switch-section">
            <p>already have an account?</p>
            <button class="switch-btn" onclick="window.location.href='loginnow.html'">log in →</button>
        </div>
    </div>
</div>
</body>
</html>
