<!DOCTYPE html>
<html>
<head>
  <title>Connect Landing</title>
  <link rel="stylesheet" href="Landing.css">
</head>

<body>

<main class="landing-page">

  <!-- NAV -->
  <nav class="landing-nav">
    <a href="#" class="landing-logo">
      <span>CG</span>
      <strong>Connect Group Management</strong>
    </a>

      <div class="landing-cta-row">
        <a href="app.html#login" class="landing-cta">Sign in</a>
      </div>
  </nav>

  <!-- HERO -->
  <section class="landing-hero">

    <!-- LEFT SIDE -->
    <div class="landing-hero-copy">
      <h1 id="title">Run shifts, clock-ins, and employee records.</h1>
      <p id="description">
        Manage schedules, payroll, and employees in one place.
      </p>

      <!-- ROLE SWITCH -->
      <div class="role-switch">
        <button onclick="setRole('admin')" id="adminBtn" class="active">Admin</button>
        <button onclick="setRole('employee')" id="employeeBtn">Employee</button>
      </div>

      <!-- LIVE CLOCK (always visible) -->
       <div class="timezone-select">
  <label>Select Location:</label>
  <select id="timezoneSelect" onchange="changeTimezone()">
    <option value="local">My Local Time</option>
    <option value="America/New_York">New York (EST/EDT)</option>
    <option value="America/Chicago">Chicago (CST/CDT)</option>
    <option value="Europe/London">London (GMT)</option>
    <option value="Asia/Dhaka">Dhaka (BST)</option>
    <option value="Asia/Tokyo">Tokyo (JST)</option>
  </select>
</div>
      <div class="feature-preview clock-box">
        <span class="clock-label">Live Clock</span>
        <strong id="clockTime" class="clock-time"></strong>
        <small id="clockDate" class="clock-date"></small>
      </div>

      <div class="landing-cta-row">
        <a href="app.html#login" class="landing-cta">Sign in</a>
      </div>
    </div>

    <!-- RIGHT SIDE (CALENDAR) -->
    <div class="calendar-container">
      <h3 id="monthYear"></h3>
      <div class="calendar" id="calendar"></div>
    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
