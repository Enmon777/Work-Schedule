<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #eaf6ff;
}

.container {
    width: 100%;
    min-height: 100vh;
    padding: 30px 20px;
    box-sizing: border-box;
}

.content {
    max-width: 1000px;
    margin: auto;
}

h1 {
    color: #0077cc;
}

.time {
    color: #555;
    margin-bottom: 20px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    overflow: hidden;
}

.card h2 {
    color: #0077cc;
}

/* OVERVIEW */
.stats {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.employee-select {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input[type="text"] {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* GRID FIX */
.schedule-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
}

/* DAYS */
.day {
    text-align: center;
    font-weight: bold;
    color: #0077cc;
}

/* INPUT FIX */
.schedule-grid input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

/* BUTTON */
.btn {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #0077cc;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.btn:hover {
    background: #005fa3;
}

.total {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
    color: #0077cc;
}

/* BOTTOM NAV */
.bottom-nav {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 40px;
    background: #d6ecff;
    padding: 12px;
    border-radius: 15px;
}

.nav-item {
    color: #0077cc;
    cursor: pointer;
}

/* RESPONSIVE FIX */
@media (max-width: 900px) {
    .schedule-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 600px) {
    .schedule-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>
</head>

<body>

<div class="container">
<div class="content">

    <!-- HEADER -->
    <h1>Admin Dashboard</h1>
    <div class="time" id="datetime"></div>

    <!-- OVERVIEW -->
    <div class="card">
        <h2>Overview</h2>

        <div class="stats">
            <div>Total Employees: <strong>5</strong></div>
            <div>Total Hours: <strong id="totalHours">0h</strong></div>
        </div>

        <div class="employee-select">
            <input type="text" id="employeeId" placeholder="Enter Employee ID">
            <button class="btn" style="width:150px;" onclick="loadEmployee()">Load</button>
        </div>
    </div>

    <!-- SCHEDULE -->
    <div class="card">
        <h2>Set Weekly Schedule</h2>

        <div class="schedule-grid">
            <div class="day">Sun</div>
            <div class="day">Mon</div>
            <div class="day">Tue</div>
            <div class="day">Wed</div>
            <div class="day">Thu</div>
            <div class="day">Fri</div>
            <div class="day">Sat</div>

            <input type="number" id="d0">
            <input type="number" id="d1">
            <input type="number" id="d2">
            <input type="number" id="d3">
            <input type="number" id="d4">
            <input type="number" id="d5">
            <input type="number" id="d6">
        </div>

        <button class="btn" onclick="saveSchedule()">Update Schedule</button>

        <div class="total" id="weeklyTotal">Weekly Total: 0h</div>
    </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
    <div class="nav-item">Approval</div>
    <div class="nav-item">Dashboard</div>
    <div class="nav-item">Menu</div>
</div>

</div>

<script>
const database = {};

function updateDateTime() {
    const now = new Date();
    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: 'numeric'
    };
    document.getElementById("datetime").innerText =
        now.toLocaleDateString('en-US', options);
}

function loadEmployee() {
    const id = document.getElementById("employeeId").value;
    if (!id) return alert("Enter Employee ID");

    let data = database[id] || [0,0,0,0,0,0,0];

    data.forEach((val, i) => {
        document.getElementById("d"+i).value = val;
    });

    calculateTotal();
}

function saveSchedule() {
    const id = document.getElementById("employeeId").value;
    if (!id) return alert("Enter Employee ID");

    let data = [];
    for (let i = 0; i < 7; i++) {
        data.push(parseInt(document.getElementById("d"+i).value) || 0);
    }

    database[id] = data;
    calculateTotal();
    alert("Schedule saved for Employee " + id);
}

function calculateTotal() {
    let total = 0;

    for (let i = 0; i < 7; i++) {
        total += parseInt(document.getElementById("d"+i).value) || 0;
    }

    document.getElementById("weeklyTotal").innerText = "Weekly Total: " + total + "h";
    document.getElementById("totalHours").innerText = total + "h";
}

setInterval(updateDateTime, 1000);
updateDateTime();
</script>

</body>
</html>
